k8s-helm-templates:
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  revisionHistoryLimit: 3

  image:
    repository: ghcr.io/rg-hermann/java-bootstrap
    tag: "0223f3557b9e52a08a3934145f1ae8ed39ffb26f"
    pullPolicy: Always
  config:
    SPRING_PROFILES_ACTIVE: "dev"
    SERVER_PORT: "8080"
    LOGGING_LEVEL_ROOT: "INFO"
    JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"

  # Secret criado externamente (External Secrets, Sealed Secrets ou manualmente)
  secret:
    existingSecret: java-bootstrap-dev-secrets

  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  serviceAccount:
    create: false

  probes:
    enabled: true

  startupProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    failureThreshold: 30
    periodSeconds: 10
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - host: java-bootstrap.local
        paths:
          - path: /
            pathType: Prefix
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 40
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  terminationGracePeriodSeconds: 60

  networkPolicy:
    enabled: false

  podDisruptionBudget:
    enabled: false

  # autoscaling:
  #   enabled: false

  # Exemplos opcionais:
  # envFrom:
  #   - configMapRef:
  #       name: shared-java-config
  # initContainers:
  #   - name: migrate
  #     image: ghcr.io/rg-hermann/java-bootstrap:latest
  #     command: ["/bin/sh", "-c", "./migrate"]
  volumes:
    - name: config
      configMap:
        name: java-bootstrap-config
    - name: data
      persistentVolumeClaim:
        claimName: java-bootstrap-data
  volumeMounts:
    - name: config
      mountPath: /app/config
      readOnly: true
    - name: data
      mountPath: /app/data
  # nodeSelector:
  #   workload: apps
  # tolerations:
  #   - key: dedicated
  #     operator: Equal
  #     value: apps
  #     effect: NoSchedule
  # topologySpreadConstraints:
  #   - maxSkew: 1
  #     topologyKey: kubernetes.io/hostname
  #     whenUnsatisfiable: ScheduleAnyway
  #     labelSelector:
  #       matchLabels:
  #         app.kubernetes.io/name: java-bootstrap
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  # secret:
  #   existingSecret: java-bootstrap-dev-secrets
  #   stringData:
  #     DB_PASSWORD: "somente para testes locais; prefira existingSecret"
